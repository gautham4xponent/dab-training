# This is a Databricks asset bundle definition for dab_training.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_training
  uuid: 171f1471-1d6c-4169-820b-888d9e3055be

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog_name:
    description: The catalog to use
    default: xponent_dev

workspace:
  host: https://adb-7405604635590717.17.azuredatabricks.net
  root_path: ~/.bundle/${bundle.name}/${bundle.target}

artifacts:
  dab_training:
    type: whl
    build: "pip wheel --no-deps -w dist ."
    path: .
    files:
      - source: ./dist/*.whl
        remote: /Volumes/${var.catalog_name}/default/libraries/  

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: xponent_dev
  staging:
    mode: production
    variables:
      catalog_name: xponent_stg
  prod:
    mode: production
    variables:
      catalog_name: xponent_prod