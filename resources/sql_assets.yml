  # ── Alert ──────────────────────────────────────────────────────────────────
  alerts:
    low_trip_count_alert:
      display_name: "Low Daily Trip Count — ${bundle.target}"   # required
      # warehouse_id: ${resources.sql_warehouses.training_warehouse.id}  # required
      warehouse_id: ${var.warehouse_id} # currently hardcoded since I dont have permission to create warehouse
      query_text: |                                              # required (inline now)
        SELECT
          trip_date,
          trip_count
        FROM ${var.catalog_name}.dab_training.taxi_gold_daily
        ORDER BY trip_date DESC
        LIMIT 1
      evaluation:
        comparison_operator: LESS_THAN
        threshold:
          value:
            double_value: 100
        source:
          name: trip_count          # column name from your SELECT
          display: "Trip Count"     # optional, human-readable label
          aggregation: MIN          # or MIN/MAX depending on your intent
        empty_result_state: TRIGGERED
      schedule:                                                  # required
        quartz_cron_schedule: "0 0 * * * ?"                  # every hour
        timezone_id: "UTC"
        pause_status: PAUSED

  # ── Lakeview Dashboard ─────────────────────────────────────────────────────
  dashboards:
    taxi_analytics_dashboard:
      display_name: "NYC Taxi Analytics — ${bundle.target}"
      file_path: ../src/taxi_dashboard.lvdash.json
      warehouse_id: ${var.warehouse_id}
      dataset_catalog: ${var.catalog_name}
      dataset_schema: dab_training