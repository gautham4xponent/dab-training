name: CD — Deploy

# ── Trigger ──────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main   # fires on every merge to main
  workflow_dispatch:  # allow manual trigger from Actions UI

concurrency:
  group: cd-${{ github.ref }}   # unique group per branch
  cancel-in-progress: true      # cancel any in-progress run when a new one starts
  
# ── Shared credentials (available to both jobs) ──────────────────────────
env:                                         # SP credentials from GitHub Secrets
    DATABRICKS_AUTH_TYPE: azure-client-secret
    DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
    ARM_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
    ARM_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    ARM_TENANT_ID: ${{ secrets.DATABRICKS_AZURE_TENANT_ID }}

jobs:

  # ── Job 1: Deploy to staging (automatic) ─────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging                               # links to the staging GitHub Environment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Who am I?
        run: databricks current-user me

      - name: Build wheel artifact
        run: |
          pip install --upgrade pip
          python setup.py bdist_wheel

      - name: Deploy to staging
        run: databricks bundle deploy --target staging

